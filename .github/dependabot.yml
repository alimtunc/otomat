version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Age dependencies past pnpm's supply-chain minimumReleaseAge (24h) so CI never rejects a too-fresh bump.
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      # Majors are deliberately ungrouped: each breaking bump lands as its own reviewable PR.
      npm-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - major
          - minor
          - patch
